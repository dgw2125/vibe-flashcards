<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chinese Flashcards</title>

    <!-- Pico.css design system -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/@picocss/pico@2/css/pico.min.css"
    />

    <!-- Your own optional styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

<body>
    <nav>
      <div class="container">
        <ul>
          <li><strong>David's Chinese Flashcards</strong></li>
        </ul>
        <ul>
          <li><a href="#" id="back-link" hidden>← Back to Packs</a></li>
          <li><a href="about.html">About This Project</a></li>
        </ul>
      </div>
    </nav>

    <main class="container">
      <div id="pack-selector">
        <label for="pack-select">Select a Flashcard Pack:</label>
        <select id="pack-select">
          <option value="metro">Shanghai Metro</option>
          <option value="shopping">Shopping</option>
          <option value="greetings">Greetings</option>
        </select>
        <button id="load-pack-btn">Load Pack</button>
      </div>

      <div id="study-area" hidden>
        <div id="study-container">
          <div id="flashcard-section">
            <h2 id="pack-name"></h2>
            
            <div id="flashcard-container">
              <!-- Left arrow -->
              <button id="prev-card-btn" class="nav-arrow left-arrow" title="Previous (← or Left Arrow)">
                ‹
              </button>

              <!-- Flashcard -->
              <div class="card" id="current-card">
                <!-- Star button (top right) -->
                <button class="star-button" id="star-btn" title="Star this card (S)">
                  ★
                </button>

                <div id="card-front">
                  <p id="chinese-text"></p>
                </div>
                <div id="card-back" hidden>
                  <p id="english-text"></p>
                  <div id="card-back-controls">
                    <div id="rating-buttons-back">
                      <button class="rating-btn easy" data-rating="easy">Easy</button>
                      <button class="rating-btn medium" data-rating="medium">Medium</button>
                      <button class="rating-btn hard" data-rating="hard">Hard</button>
                    </div>
                    <div class="rating-badge" id="rating-badge"></div>
                  </div>
                </div>
              </div>

              <!-- Right arrow -->
              <button id="next-card-btn" class="nav-arrow right-arrow" title="Next (→ or Right Arrow)">
                ›
              </button>
            </div>
          </div>

          <div id="sidebar">
            <div id="mastery-toggle">
              <div class="mastery-toggle-row">
                <span>Advanced Features</span>
                <button id="advanced-mastery-toggle" class="toggle-switch" aria-label="Toggle advanced mastery features">
                  <span class="toggle-slider"></span>
                </button>
              </div>
            </div>

            <div id="stats">
              <h3>Progress</h3>
              <progress id="progress" value="0" max="100"></progress>
              <p id="card-counter">Card 1 of 10</p>
            </div>

            <!-- Star count display -->
            <div id="star-count-display">
              <p><strong>Starred Cards</strong></p>
              <p id="star-count-number">0</p>
            </div>

            <div id="controls">
              <button id="shuffle-btn">🔀 Shuffle</button>
              <button id="filter-button" hidden>✗ Review Hard Cards</button>
            </div>

            <div id="keyboard-shortcuts">
              <p><strong>Keyboard Shortcuts:</strong></p>
              <ul>
                <li><code>Space</code> — Flip</li>
                <li><code>←</code> / <code>→</code> — Navigate</li>
                <li><code>S</code> — Star</li>
                <li><code>R</code> — Shuffle</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <div id="end-screen" hidden>
        <h2>Pack Complete!</h2>
        <div id="end-screen-content"></div>
        <button id="review-again-btn">Review Again</button>
        <button id="review-starred-btn" hidden>Review Starred Cards</button>
        <button id="review-hard-btn" hidden>Review Hard Cards</button>
        <button id="back-selector-btn">Back to Pack Selector</button>
      </div>
    </main>

    <script src="cards.js"></script>
    <script src="masteryStore.js"></script>
    <script src="script.js"></script>
  </body>
</html>
